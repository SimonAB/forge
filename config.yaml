# Directories whose direct children are Forge projects (each path can list more roots).
# Tag those project folders with project_tag (e.g. 🔥 Forge) in Finder.
project_roots:
  - ~/Documents/Work/
  - ~/Documents/Work/Projects
  - ~/Documents/Work/Students/
  - ~/Documents/Work/Reviews-grants/
  - ~/Documents/Work/Reviews-papers/
  - ~/Documents/Work/Teaching/2025-2026/
  - ~/Documents/Sanctum/
  - ~/Documents/Home/
# Optional: only directories that have this Finder tag are treated as Forge projects.
# If set, untagged folders under project_roots are ignored. Default: "🔥 Forge".
project_tag: "🔥 Forge"
